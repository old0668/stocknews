# 需在 GitHub Secrets 設定：
# - CLOUDFLARE_API_TOKEN
# - CLOUDFLARE_ACCOUNT_ID
# - CLOUDFLARE_PAGES_PROJECT（Cloudflare Pages 專案名稱）

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "functions/**"
      - "data/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "wrangler.toml"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_PAGES_PROJECT" ]; then
            echo "Missing secret: CLOUDFLARE_PAGES_PROJECT"
            exit 1
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Build static site (web + data → dist)
        run: npm run build

      - name: Show Wrangler version
        run: npx wrangler --version

      # 必須使用 `wrangler pages deploy`，勿用 `wrangler deploy`（那是 Workers）。
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name="$CLOUDFLARE_PAGES_PROJECT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
