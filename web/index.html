<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 經濟情報站</title>
  <link rel="stylesheet" href="./app.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>🗞️ 經濟情報站</h1>
      <p class="hint">一般網頁 + Cloudflare Pages；評論與情緒／信心指數由 <strong>Gemini API</strong> 產生（<code>/api/generate</code>）。下方「最新抓取稿件」顯示 RSS 原始資料（今日累積 + 48h 候選池）。</p>
      <p id="syncStatus" class="sync-status" aria-live="polite"></p>
    </header>

    <div class="grid">
      <section class="panel summary-panel">
        <h2>💡 核心動態摘要</h2>
        <div id="msg" class="msg" hidden></div>
        <div class="toolbar">
          <button type="button" id="btnToggleNews" class="btn btn-primary">24HR新聞</button>
          <button type="button" id="btnRefresh" class="btn btn-primary">立即更新</button>
          <button type="button" id="btnClearCache" class="btn btn-secondary">清除暫存並重新載入</button>
        </div>
        <div id="summaryList" class="summary-list"></div>
      </section>

      <section class="panel chart-panel">
        <h2>📈 市場信心走勢</h2>
        <div id="metric" class="metric" hidden></div>
        <div class="unit-row">
          <span class="unit-label">單位</span>
          <label><input type="radio" name="unit" value="raw" checked /> 原始</label>
          <label><input type="radio" name="unit" value="hour" /> 小時</label>
          <label><input type="radio" name="unit" value="day" /> 天</label>
        </div>
        <div id="chart" class="chart"></div>
        <p id="chartEmpty" class="empty">尚無走勢資料。請執行聚合或按「立即更新」。</p>
      </section>
    </div>

    <section class="panel raw-news-panel">
      <h2>📰 最新抓取稿件</h2>
      <p id="rawNewsMeta" class="raw-news-meta"></p>
      <ul id="rawNewsList" class="raw-news-list" aria-label="RSS 抓取列表"></ul>
      <p id="rawNewsEmpty" class="empty" hidden>
        尚無稿件。請在本機執行 <code>python main.py</code> 寫入 <code>data/</code> 後重新整理；若用靜態伺服器請確認能讀取 <code>data/today_news.json</code>。
      </p>
    </section>

    <footer class="footer">Powered by Gemini（經 Cloudflare 代理）</footer>
  </div>
  <script type="module" src="./app.js" defer></script>
</body>
</html>
