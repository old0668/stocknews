<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>祥老師新聞情報站</title>
  <link rel="stylesheet" href="./app.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>🗞️ 祥老師新聞情報站</h1>
    </header>

    <div class="grid">
      <section class="panel summary-panel">
        <h2>🆕 最新新聞</h2>
        <div id="msg" class="msg" hidden></div>
        <div class="toolbar">
          <button type="button" id="btnToggleNews" class="btn btn-primary">顯示近3日新聞</button>
          <button type="button" id="btnRefresh" class="btn btn-primary">更新新聞</button>
        </div>
        <div id="summaryList" class="summary-list"></div>
      </section>

      <section class="panel chart-panel">
        <h2>🔎 關鍵字搜尋</h2>
        <div class="keyword-search">
          <input id="keywordInput" class="keyword-input" type="text" placeholder="輸入關鍵字（例如：台積電、NVIDIA、Fed）" />
          <div class="keyword-actions">
            <button type="button" id="btnKeywordSearch" class="btn btn-primary">搜尋</button>
            <button type="button" id="btnKeywordAdd" class="btn btn-secondary">加入預設</button>
            <button type="button" id="btnKeywordClear" class="btn btn-secondary">清除</button>
            <button type="button" id="btnKeywordToggle" class="btn btn-secondary">展開</button>
          </div>
          <p id="keywordStatus" class="keyword-status">目前：全部新聞</p>
          <div id="keywordExpandable" class="keyword-expandable" hidden>
            <div class="keyword-help">
              <p>1) 單一關鍵字：直接輸入後按搜尋。</p>
              <p>2) 多關鍵字：用 <code>+</code> 串接（AND），例如 <code>台積電 + 財報</code>。</p>
              <p>3) 可按「加入預設」存成快速按鈕；自訂關鍵字可用 <code>x</code> 刪除。</p>
            </div>
            <div id="presetKeywords" class="preset-keywords" aria-label="預設關鍵字"></div>
          </div>
        </div>
      </section>
    </div>

    <section class="panel raw-news-panel" hidden>
      <h2>📰 最新抓取稿件</h2>
      <p id="rawNewsMeta" class="raw-news-meta"></p>
      <ul id="rawNewsList" class="raw-news-list" aria-label="RSS 抓取列表"></ul>
      <p id="rawNewsEmpty" class="empty" hidden>
        尚無稿件。請在本機執行 <code>python main.py</code> 寫入 <code>data/</code> 後重新整理；若用靜態伺服器請確認能讀取 <code>data/today_news.json</code>。
      </p>
    </section>

    <footer class="footer">Powered by RSS aggregation</footer>
  </div>
  <script type="module" src="./app.js" defer></script>
</body>
</html>
